<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>CSS Text Formatting</title>
    <style>
      body{
        font-family:Arial,sans-serif;
        margin:30px;
      }
      h1{
        text-align:center;
        color:darkblue;
      }

      h2{
        text-transform:uppercase;
        color:green;
      }
      h3{
        text-decoration:underline;
        color:red;
      }
      p{
        text-align:justift;
        letter-spacing:2px;
        line-height:1.8;
        font-size:18px
      }
    </style>
  </head>
  <body>
<h1>CSS Text Formatting</h1>
<h2>Text Transform Property</h2>
<h3>Text Decoration Property</h3>
<p>cascading Style Sheet(css) is used to control the appearence of web pages.</p>
  </body>
</html>
