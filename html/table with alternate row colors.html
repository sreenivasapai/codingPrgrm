<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Styled Table</title>
    <style>
      body{
        font-family:Arial,Sans-serif;
        margin:30px
      }
      h1{
        text-align:center
      }
      table{
        width:60%;
        margin:auto;
        border-collapse:collapse;
      }
      th{
        border:2px solid black;
        padding:10px;
        background-color:darkblue;
        color:white;
      }
      td{
        border:2px solid black;
        padding:10px;
        text-align:center;
      }
      tr:nth-child(even){
        background-color:lightgrey;
      }
      tr:nth-child(odd){
        background-color:white;
      }
      tr:hover{
        background-color:lightgreen;
      }
    </style>
  </head>
  <body>
    <h1>Student Details</h1>
    <table>
      <tr>
      <th>Roll no</th>
      <th>Name</th>
      <th>Course</th>
      <th>Marks</th>

      </tr>
      <tr>
        <td>101</td>
        <td>ASHWIN</td>
        <td>MCA</td>
        <td>75</td>
      </tr>
      <tr>
        <td>102</td>
        <td>NANDU</td>
        <td>MCA</td>
        <td>79</td>
      </tr>
      <tr>
        <td>103</td>
        <td>ANANDHAN</td>
        <td>MCA</td>
        <td>78</td>
      </tr>

    </table>

  </body>
</html>
