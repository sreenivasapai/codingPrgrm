<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>CSS SELECTORS</title>

    <style>
      /*Class Selector*/
      .highlight{
        color:green;
        font-size:20px;
        font-weight:bold;
      }
      /*ID Selector*/
      #special{
        color:red;
        background-color:yellow;
        padding:10px;
        border:2px solid darkblue;
      }

    </style>
  </head>

  <body>
    <h1>CSS Selector Example</h1>
    <p class="highlight">This Paragraph uses the Class Selector</p>
    <p id="special">THis Paragraph Uses ID Selector</p>
  </body>
</html>
